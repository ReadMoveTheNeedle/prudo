<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Join the Waitlist — Prudo</title>
<meta name="description" content="Join the Prudo waitlist via Move The Needle. Launching beginning of September." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          obsidian: '#050407',
          prudo: '#7C3AED',
          prudoLight: '#A78BFA',
          app: { bg: '#0f0f11', surface: '#1c1c1f', border: '#2e2e33', secondary: '#a1a1aa', accent: '#6366f1' },
        },
        fontFamily: {
          sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  html, body { background-color: #050407; height: 100%; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 0px; background: transparent; }
  .glow-text { text-shadow: 0 0 28px rgba(124, 58, 237, 0.55); }
  .glass-border { border: 1px solid rgba(124, 58, 237, 0.22); }
  .grain {
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .aurora-bg {
    background:
      radial-gradient(45% 40% at 50% 28%, rgba(124,58,237,0.2), transparent 70%),
      radial-gradient(30% 30% at 85% 80%, rgba(124,58,237,0.09), transparent 70%);
  }
  .pulse-dot { animation: pulse 2.4s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); }
    70% { box-shadow: 0 0 0 14px rgba(124,58,237,0); }
    100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); }
  }

  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(3, 2, 6, 0.78);
    backdrop-filter: blur(7px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }
  #modal-overlay.active { pointer-events: auto; }
</style>
</head>
<body class="text-white antialiased grain aurora-bg min-h-screen overflow-y-auto">

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 backdrop-blur-md bg-[#050407]/70 border-b border-white/5">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
    <a href="index.html" class="text-xl font-semibold tracking-tight">
      Prudo
    </a>
    <nav class="flex items-center gap-8 text-sm">
      <a href="index.html" class="text-white/55 hover:text-white transition-colors duration-300">Home</a>
      <a href="about.html" class="text-white/55 hover:text-white transition-colors duration-300">About Us</a>
      <a href="waitlist.html" class="px-4 py-2 rounded-full bg-prudo text-white text-sm font-medium shadow-[0_0_20px_rgba(124,58,237,0.35)]">
        Join Waitlist
      </a>
    </nav>
  </div>
</header>

<main class="min-h-screen flex items-center justify-center px-6 pt-28 pb-20">
  <div class="text-center" id="hero-content">

    <div class="inline-flex items-center gap-2 mb-10 px-3 py-1 rounded-full glass-border bg-white/[0.03] text-xs text-prudoLight">
      <span class="w-1.5 h-1.5 rounded-full bg-prudo pulse-dot"></span>
      Launching beginning of September
    </div>

    <!-- PRUDO AVATAR -->
    <div class="flex justify-center mb-12">
      <div class="relative flex items-center justify-center">
        <img src="assets/prudo-neutral.png" alt="Prudo" class="w-full max-w-[320px] h-auto object-contain relative z-10" />
        <div class="absolute -z-10 w-[480px] h-[480px] rounded-full bg-prudo/20 blur-3xl"></div>
      </div>
    </div>

    <h1 class="text-4xl md:text-6xl font-semibold tracking-tight leading-[1.1]">
      Prudo<span class="text-prudoLight glow-text">.</span>
    </h1>
    <p class="mt-5 text-lg text-white/50 max-w-md mx-auto leading-relaxed">
      The app that makes sure you actually start.
    </p>

    <button id="open-modal" class="mt-12 inline-flex items-center gap-2 px-10 py-5 rounded-full bg-prudo hover:bg-prudoLight transition-all duration-500 text-lg font-medium shadow-[0_0_40px_rgba(124,58,237,0.45)] hover:shadow-[0_0_55px_rgba(124,58,237,0.65)]">
      Join the Waitlist
    </button>
  </div>
</main>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box" class="relative w-[90%] max-w-md rounded-3xl bg-[#100E16] glass-border p-8 md:p-10 shadow-[0_0_60px_rgba(124,58,237,0.35)]">
    <button id="close-modal" class="absolute top-5 right-5 text-white/40 hover:text-white transition-colors text-xl leading-none">✕</button>

    <div class="flex justify-center mb-6">
      <img src="assets/prudo-neutral.png" alt="Prudo" class="h-24 w-auto object-contain" />
    </div>

    <h2 class="text-2xl font-semibold text-center tracking-tight mb-4">You're almost on the list</h2>
    <p class="text-white/55 text-center leading-relaxed mb-8">
      Join our Substack to get on the waiting list and get weekly productivity systems.
      Launching beginning of september.
    </p>

    <a href="https://readmovetheneedle.substack.com" target="_blank" rel="noopener noreferrer"
       id="confirm-substack"
       class="block text-center w-full px-6 py-4 rounded-full bg-prudo hover:bg-prudoLight transition-all duration-500 font-medium shadow-[0_0_30px_rgba(124,58,237,0.4)] hover:shadow-[0_0_45px_rgba(124,58,237,0.6)]">
      Continue to Substack →
    </a>
  </div>
</div>

<script>
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  const openBtn = document.getElementById('open-modal');
  const closeBtn = document.getElementById('close-modal');

  gsap.set('#hero-content > *', { opacity: 0, y: 26 });
  gsap.to('#hero-content > *', { opacity: 1, y: 0, duration: 1.1, stagger: 0.14, ease: 'power4.out', delay: 0.15 });

  gsap.set(box, { opacity: 0, y: 22, scale: 0.95 });

  function openModal() {
    overlay.classList.add('active');
    gsap.to(overlay, { opacity: 1, duration: 0.4, ease: 'power2.out' });
    gsap.to(box, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.4)' });
  }

  function closeModal() {
    gsap.to(box, { opacity: 0, y: 22, scale: 0.95, duration: 0.35, ease: 'power2.in' });
    gsap.to(overlay, {
      opacity: 0,
      duration: 0.35,
      ease: 'power2.in',
      onComplete: () => overlay.classList.remove('active'),
    });
  }

  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) closeModal();
  });
</script>
</body>
</html>
